<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Código de Spotify</title>
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      background: #15131a;
      color: #f4ede4;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px;
      text-align: center;
    }
    h1 { font-size: 1.4em; margin-bottom: 16px; color: #ffd166; }
    p { color: #b9aebf; margin-bottom: 20px; font-size: 0.95em; line-height: 1.4; }
    .caja-codigo {
      background: #211d28; border: 1px solid #4a3f52; border-radius: 12px;
      padding: 20px; max-width: 480px; width: 100%; word-break: break-all;
      font-family: monospace; font-size: 1em; margin-bottom: 20px;
      user-select: all; -webkit-user-select: all;
    }
    .boton {
      display: inline-block; padding: 14px 28px;
      background: linear-gradient(90deg, #ff8a5c, #ffd166); color: #15131a;
      border: none; border-radius: 30px; font-weight: bold; font-size: 1em;
      cursor: pointer; max-width: 480px; width: 100%;
    }
    .aviso-error { color: #ff8a5c; }
  </style>
</head>
<body>
  <div id="contenido">
    <h1>Cargando...</h1>
  </div>

  <script>
    // Leemos los parámetros que Spotify agregó a la URL después de "?"
    const parametros = new URLSearchParams(window.location.search);
    const codigo = parametros.get("code");
    const error = parametros.get("error");
    const contenedor = document.getElementById("contenido");

    if (codigo) {
      contenedor.innerHTML = `
        <h1>✅ Código obtenido</h1>
        <p>Copia este código completo y pégalo en la página del dispositivo (ESP32):</p>
        <div class="caja-codigo" id="cajaCodigo">${codigo}</div>
        <button class="boton" onclick="copiarCodigo()">Copiar código</button>
      `;
    } else if (error) {
      contenedor.innerHTML = `
        <h1 class="aviso-error">❌ No se completó el login</h1>
        <p>Spotify reportó: ${error}. Vuelve a intentarlo desde el dispositivo.</p>
      `;
    } else {
      contenedor.innerHTML = `
        <h1 class="aviso-error">❌ No se encontró ningún código</h1>
        <p>Esta página solo funciona si llegaste aquí después de autorizar la app en Spotify.</p>
      `;
    }

    function copiarCodigo() {
      const texto = document.getElementById("cajaCodigo").innerText;
      navigator.clipboard.writeText(texto).then(() => {
        alert("¡Código copiado! Ahora pégalo en la página del ESP32.");
      });
    }
  </script>
</body>
</html>
