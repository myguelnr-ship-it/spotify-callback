<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Conectando con Spotify</title>
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      background: #eef1e2;
      color: #0c0b08;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px;
      text-align: center;
    }
    h1 { font-size: 1.5em; margin-bottom: 14px; font-weight: 900; text-transform: uppercase; }
    p { color: #2c2a22; margin-bottom: 10px; font-size: 1em; line-height: 1.4; max-width: 40ch; }
    .spinner {
      width: 36px; height: 36px; border: 4px solid #0c0b0822;
      border-top-color: #0c0b08; border-radius: 50%;
      animation: girar 0.8s linear infinite; margin-bottom: 18px;
    }
    @keyframes girar { to { transform: rotate(360deg); } }
    .aviso-error { color: #b3261e; }
  </style>
</head>
<body>
  <div id="contenido">
    <div class="spinner"></div>
    <h1>Procesando...</h1>
    <p>No cierres esta pestaña todavía.</p>
  </div>

  <script>
    // ---------------------------------------------------------------
    // CONFIGURACIÓN: pon aquí la URL de tu Firebase Realtime Database
    // (la que copiaste en el Paso B de la guía, terminada en "/")
    // ---------------------------------------------------------------
    const FIREBASE_URL = "https://perfil-musical-esp32-default-rtdb.firebaseio.com/";

    const parametros = new URLSearchParams(window.location.search);
    const codigo = parametros.get("code");
    const sesion = parametros.get("state"); // El ESP32 manda un "state" único por sesión
    const error = parametros.get("error");
    const contenedor = document.getElementById("contenido");

    async function guardarEnFirebase() {
      try {
        // Guardamos el código bajo una ruta única: /sesiones/<state>.json
        const url = FIREBASE_URL + "sesiones/" + sesion + ".json";
        const respuesta = await fetch(url, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ codigo: codigo, timestamp: Date.now() })
        });

        if (respuesta.ok) {
          contenedor.innerHTML = `
            <h1>✅ Listo</h1>
            <p>Ya puedes regresar a la pantalla del dispositivo. Se conectará solo en unos segundos.</p>
          `;
        } else {
          throw new Error("Firebase respondió con error");
        }
      } catch (e) {
        contenedor.innerHTML = `
          <h1 class="aviso-error">❌ No se pudo guardar</h1>
          <p>Hubo un problema de conexión. Vuelve a intentarlo desde el dispositivo.</p>
        `;
      }
    }

    if (error) {
      contenedor.innerHTML = `
        <h1 class="aviso-error">❌ No se completó el login</h1>
        <p>Spotify reportó: ${error}. Vuelve a intentarlo desde el dispositivo.</p>
      `;
    } else if (codigo && sesion) {
      guardarEnFirebase();
    } else {
      contenedor.innerHTML = `
        <h1 class="aviso-error">❌ Falta información</h1>
        <p>Esta página solo funciona si llegaste aquí después de autorizar la app en Spotify desde el dispositivo.</p>
      `;
    }
  </script>
</body>
</html>
